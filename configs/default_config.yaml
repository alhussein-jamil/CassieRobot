training:
  environment:
    env: cassie-v0
    clip_actions: true
    normalize_actions: true
    env_config:
      # The constants are defined here
      symmetric_regulation: true
      steps_per_cycle: 20
      r : 0.6
      kappa: 20
      x_cmd_vel: 1.5
      y_cmd_vel: 0.0
      z_cmd_vel: 0
      terminate_when_unhealthy: true
      max_simulation_steps: 300
      pelvis_height: [0.65,1.25]
      feet_distance_x: 0.8
      feet_distance_y: 0.6
      feet_distance_z: 0.5
      feet_pelvis_height: 0.25
      max_roll: 2.0
      max_pitch: 2.0
      max_yaw: 10.0
      feet_height: 0.08
      model: cassie
      frame_skip: 20
      render_mode: rgb_array
      width: 1920
      height: 1080
      reset_noise_scale: 0.1
      force_max_norm: 30.0
      push_freq: 80 # Every 80 steps
      push_duration: 5 # 5 steps
      bias: -0.2 # Make sure reward can be negative
      r_biped: 0.3
      r_cmd : 1.0
      r_smooth: 0.1
    render_env: false

  env_runners:
    enable_tf1_exec_eagerly: true
    num_env_runners: 20
    num_envs_per_env_runner: 1
    num_cpus_per_env_runner: 1
    num_gpus_per_env_runner: 0
    rollout_fragment_length: auto
    batch_mode: truncate_episodes
    observation_filter: MeanStdFilter


  debugging:
    logger_creator: ???
    log_level: INFO

  fault_tolerance:
    restart_failed_env_runners: true
    ignore_env_runner_failures: true
    restart_failed_sub_environments: true

  training:
    # Core training parameters
    gamma: 0.99
    grad_clip: 1.0
    train_batch_size: 16384 # Note: may need adjustment based on total env runners & learners if using train_batch_size_per_learner

    # Model configuration
    model:
      fcnet_hiddens: [256, 256]
      fcnet_activation: elu
      fcnet_weights_initializer: xavier_uniform_
      fcnet_bias_initializer: zeros
      post_fcnet_activation: elu
      free_log_std: true
      vf_share_layers: false # Explicitly setting based on PPO defaults

    # Optimizer configuration
    optimizer:
      type: adam
      # Add optimizer-specific params like lr here if needed,
      # otherwise top-level 'lr' is used.
      # lr: 5e-5 # Example if overriding top-level lr

    # PPO specific parameters
    use_critic: true
    use_gae: true
    lambda_: 0.92
    use_kl_loss: true  # Explicitly setting based on PPO defaults
    kl_coeff: 0.2
    kl_target: 0.01
    minibatch_size: 1024 # Renamed from sgd_minibatch_size
    num_epochs: 16       # Renamed from num_sgd_iter
    shuffle_batch_per_epoch: true # Renamed from shuffle_sequences
    vf_loss_coeff: 0.5
    entropy_coeff: 0.003
    clip_param: 0.3
    vf_clip_param: 10.0 # Added based on PPO defaults

  framework:
    framework: torch
    torch_compile_worker_dynamo_backend: ipex
    torch_compile_worker_dynamo_mode: max-autotune

  resources:
    num_gpus: 1



run:
  sim_fps: ???
  render_every: 600 # seconds
  chkpt_freq: 2400 # seconds
  epochs: 50000
  hyper_par_iter: 1
  n_particles: 1
